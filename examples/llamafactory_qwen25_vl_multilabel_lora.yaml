### Example launcher-oriented config for a Llama-Factory fork.
### The concrete hook names depend on the fork integration.

stage: ophthalmology_multilabel
do_train: true
model_name_or_path: Qwen2.5-VL-3B-EyeCoRE-CoTTwoStage
template: qwen2_vl
finetuning_type: lora
lora_target:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
dataset_dir: outputs/manifests
train_manifest: outputs/manifests/train.jsonl
eval_manifest: outputs/manifests/val.jsonl
image_root: /home/sqw/VisualSearch/mm_linyan/imgdata
num_labels: 20
max_oct_images: 5
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 12
bf16: true
metric_for_best_model: macro_f1
load_best_model_at_end: true
output_dir: outputs/qwen25_vl_multilabel
